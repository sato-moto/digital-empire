<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Todo | ワークスペース</title>
    <meta name="description" content="タスクを効率的に管理するためのパーソナルワークスペースです。">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="bg-orbs"></div>

    <div class="app-container">
        <header class="app-header">
            <h1>ワークスペース</h1>
            <a href="index.html" class="back-link">← ホームに戻る</a>
        </header>

        <div class="input-group">
            <input type="text" id="todo-input" placeholder="何をすべきですか？" autocomplete="off">
            <button id="add-btn" class="add-btn">タスクを追加</button>
        </div>

        <ul class="todos-list" id="todos-list">
            <!-- Todos will be injected here via JS -->
        </ul>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
