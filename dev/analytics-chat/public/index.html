<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壁打ちコーナー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #f7f6f3;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
    padding: 24px;
  }
  #setup h2 { font-size: 16px; color: #333; }
  #setup p  { font-size: 13px; color: #888; text-align: center; }
  #setup input {
    width: 100%;
    max-width: 400px;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  #setup button {
    background: #2f2f2f;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 14px;
    cursor: pointer;
  }
  #app { display: none; flex-direction: column; height: 100vh; }
  #header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 12px 16px;
    font-size: 13px;
    color: #666;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #header-left { display: flex; align-items: center; gap: 8px; }
  #reset-btn { font-size: 11px; color: #bbb; cursor: pointer; background: none; border: none; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #2f2f2f;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    align-self: flex-start;
    background: #fff;
    color: #1a1a1a;
    border: 1px solid #e5e5e5;
    border-bottom-left-radius: 4px;
  }
  .msg.loading { color: #aaa; font-style: italic; }
  #input-area {
    background: #fff;
    border-top: 1px solid #e5e5e5;
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #input:focus { border-color: #aaa; }
  #send {
    background: #2f2f2f;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    height: 40px;
  }
  #send:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>

<!-- APIキー設定画面（初回のみ） -->
<div id="setup">
  <h2>💬 壁打ちコーナー — 初期設定</h2>
  <p>AnthropicのAPIキーを入力してください。<br>このデバイスに1回だけ保存されます。</p>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." />
  <button onclick="saveKey()">保存して始める</button>
</div>

<!-- チャット画面 -->
<div id="app">
  <div id="header">
    <div id="header-left">
      <span>💬</span>
      <span>今日のレポートについて何でも聞いてください</span>
    </div>
    <button id="reset-btn" onclick="resetKey()">APIキーをリセット</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" placeholder="メッセージを入力… (Enterで送信)" rows="1"></textarea>
    <button id="send">送信</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'anthropic_api_key';
  const params = new URLSearchParams(window.location.search);
  const pageId  = params.get('pageId') || '';

  // システムプロンプト（Notionデータは今後フェーズ2で動的取得）
  const SYSTEM = `あなたは地域情報メディア「熊取つーしん（kumatori-info.com）」の運営者・佐藤さんの専属アシスタントです。
佐藤さんはSEOの専門知識はない個人運営者です。
ルール：
- 専門用語は使わない。使うなら必ず一言で説明する
- 答えは短く具体的に
- 「この記事どう思う？」「クリック率ってなに？」など何でも気軽に答える
- 熊取町の地域情報メディアという文脈を常に意識する`;

  function init() {
    const key = localStorage.getItem(STORAGE_KEY);
    if (key) {
      showApp();
    }
  }

  function saveKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key.startsWith('sk-ant-')) { alert('APIキーが正しくありません'); return; }
    localStorage.setItem(STORAGE_KEY, key);
    showApp();
  }

  function resetKey() {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

  function showApp() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    addMsg('ai', 'こんにちは！今日のアナリティクスを踏まえて、何でも気軽に聞いてください。\n「この数字どういう意味？」「こんな記事どう思う？」「このキーワードで記事書けそう？」など何でもOKです。');
    document.getElementById('input').focus();
  }

  // メッセージ履歴
  const history = [];

  function addMsg(role, text, isLoading = false) {
    const el = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'ai'}${isLoading ? ' loading' : ''}`;
    div.textContent = text;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
    return div;
  }

  document.getElementById('input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  document.getElementById('input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  document.getElementById('send').addEventListener('click', send);

  async function send() {
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    const apiKey = localStorage.getItem(STORAGE_KEY);
    if (!apiKey) { resetKey(); return; }

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const loadingEl = addMsg('ai', '考え中…', true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system: SYSTEM,
          messages: history
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const reply = data.content?.[0]?.text || 'エラーが発生しました。';
      loadingEl.textContent = reply;
      loadingEl.classList.remove('loading');
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      loadingEl.textContent = `エラー: ${err.message}`;
      loadingEl.classList.remove('loading');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  init();
</script>
</body>
</html>
